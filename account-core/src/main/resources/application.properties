server.port=${SERVER_PORT:8081}
spring.application.name=account-core-service

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/banquito_account_core_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

accounting.service.url=${ACCOUNTING_SERVICE_URL:http://localhost:8082}

party.service.url=${PARTY_SERVICE_URL:http://localhost:8083}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always