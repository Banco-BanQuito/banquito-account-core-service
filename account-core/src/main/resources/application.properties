server.port=${SERVER_PORT:8081}

# Base de datos PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/accountdb}
spring.datasource.username=${DB_USER:banquito}
spring.datasource.password=${DB_PASS:banquito123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Comunicaciˇn con otros micros (URLs para desarrollo local)
accounting.service.url=${ACCOUNTING_SERVICE_URL:http://localhost:8082}
party.service.url=${PARTY_SERVICE_URL:http://localhost:8083}

# Horario de corte
cut.off.time=${CUT_OFF_TIME:20:00}

accounting.grpc.host=${ACCOUNTING_GRPC_HOST:localhost}
accounting.grpc.port=${ACCOUNTING_GRPC_PORT:9092}
party.grpc.host=${PARTY_GRPC_HOST:localhost}
party.grpc.port=${PARTY_GRPC_PORT:9093}
account-core.grpc.port=${ACCOUNT_CORE_GRPC_PORT:9091}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
